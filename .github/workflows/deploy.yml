name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 64.176.73.226 >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          # Sync code to server (excluding .git, .env, node_modules, etc)
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'node_modules' \
            --exclude '__pycache__' \
            --exclude '.venv' \
            --exclude '*.db' \
            --exclude 'data/' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ root@64.176.73.226:/opt/fact-card/

      - name: Build and start containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 64.176.73.226
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/fact-card

            # Create/update .env for backend
            cat > .env << 'EOF'
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }}
            AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }}
            AUTH0_ISSUER=${{ secrets.AUTH0_ISSUER }}
            VITE_API_BASE=https://fact.slotik.app
            VITE_WS_BASE=wss://fact.slotik.app
            VITE_AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }}
            VITE_AUTH0_CLIENT_ID=${{ secrets.AUTH0_CLIENT_ID }}
            VITE_AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }}
            VITE_AUTH0_REDIRECT_URI=https://fact.slotik.app
            EOF

            # Build and deploy
            docker compose down || true
            docker compose build --no-cache
            docker compose up -d

            # Cleanup old images
            docker image prune -f

            echo "Deploy completed at $(date)"
