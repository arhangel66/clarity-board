name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node dependencies (root)
        run: pnpm install

      - name: Install Node dependencies (frontend)
        run: |
          cd frontend
          pnpm install

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        run: |
          cd backend
          uv sync

      - name: Run backend tests
        run: |
          cd backend
          uv run pytest -q

      - name: Run frontend unit tests
        run: |
          cd frontend
          pnpm test -- --run

      - name: Build frontend
        run: |
          cd frontend
          pnpm build

      - name: Run frontend checks
        run: |
          cd frontend
          pnpm check

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Create test .env file
        run: |
          echo "OPENROUTER_API_KEY=test-key-not-used-in-mock-mode" > .env
          echo "DEV_AUTH_BYPASS=true" >> .env
          echo "AI_MOCK_MODE=true" >> .env

      - name: Run E2E tests
        run: pnpm e2e
        env:
          DEV_AUTH_BYPASS: 'true'
          AI_MOCK_MODE: 'true'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
